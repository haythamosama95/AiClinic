_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://auth:9999/
    routes:
      - name: auth-v1
        paths:
          - /auth/v1/
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 30
          hour: 500
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: rest
    url: http://rest:3000/
    routes:
      - name: rest-v1
        paths:
          - /rest/v1/
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 60
          hour: 1000
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: storage
    url: http://storage:5000/
    routes:
      - name: storage-v1
        paths:
          - /storage/v1/
        strip_path: false

  - name: realtime
    url: http://realtime:4000/socket/
    routes:
      - name: realtime-v1
        paths:
          - /realtime/v1/
        strip_path: false
